name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run rebuild

      - name: Verify dist/ is in sync
        run: |
          if ! git diff --quiet dist/; then
            echo "ERROR: dist/ is out of sync with source. Run 'npm run rebuild' locally and commit." >&2
            git --no-pager diff --stat dist/
            exit 1
          fi

      - name: Unit tests
        run: npm run test

      - name: Type tests (tsd)
        run: npm run test:types
